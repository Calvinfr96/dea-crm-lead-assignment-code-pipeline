name: Deploy CRM Lead Assignment Pipeline

on:
  push:
    branches:
      - main # Triggers code deployment automatically on push to main branch

# Required permissions block for secure OIDC token generation
permissions:
  id-token: write # Mandatory for requesting the AWS JWT token
  contents: read # Mandatory to allow actions/checkout to read your code

jobs:
  deploy:
    name: Build & Deploy CDK Stack
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Node.js runtime environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Securely authenticate with AWS using OIDC Role
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::515424600331:role/GitHubActionsCDKDeployRole # <-- Replace with your AWS IAM Role ARN
          aws-region: us-east-1 # <-- Replace with your targeted AWS deployment region

      # 4. Install production dependencies and CDK tooling
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          npm install -g aws-cdk


      # 5. Synthesize and Deploy Stack to AWS Cloud
      - name: Deploy CDK Stack
        env:
          # Pulls the secret safely from GitHub and maps it to the Python environment
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }} 
        run: cdk deploy --require-approval never
